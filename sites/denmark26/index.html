<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samsø Trip — Denmark 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:   #f5f0e8;
      --sea:    #2a6496;
      --sea-lt: #3a85c9;
      --text:   #1a1a1a;
      --muted:  #666;
      --rule:   #d8cfc0;
      --max:    720px;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--sand);
      color: var(--text);
      line-height: 1.75;
      padding: 2rem 1.25rem 4rem;
    }

    header {
      max-width: var(--max);
      margin: 0 auto 3rem;
      border-bottom: 2px solid var(--rule);
      padding-bottom: 1.5rem;
    }

    header .eyebrow {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sea);
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: normal;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--text);
    }

    header .meta {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.6rem;
    }

    main {
      max-width: var(--max);
      margin: 0 auto;
    }

    h2 {
      font-size: 1.4rem;
      font-weight: normal;
      margin: 2.5rem 0 0.75rem;
      color: var(--sea);
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.35rem;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: bold;
      margin: 1.75rem 0 0.5rem;
    }

    p {
      margin-bottom: 1rem;
    }

    ul, ol {
      margin: 0.5rem 0 1rem 1.5rem;
    }

    li {
      margin-bottom: 0.35rem;
    }

    blockquote {
      border-left: 3px solid var(--sea-lt);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: var(--muted);
      font-style: italic;
    }

    a {
      color: var(--sea);
    }

    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2rem 0;
    }

    footer {
      max-width: var(--max);
      margin: 3rem auto 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      border-top: 1px solid var(--rule);
      padding-top: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Denmark 2026 &mdash; Samsø</p>
    <h1>Samsø Trip</h1>
    <p class="meta"><!-- dates will go here --></p>
  </header>

  <main>
    <!-- content from samso-trip.md will be placed here -->
    <p><em>Content coming soon.</em></p>
  </main>

  <footer>
    <p>sites.eliandor.com &mdash; denmark26</p>
  </footer>
</body>
</html>
